<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YODA — Where life stories meet care</title>
<style>
  /* ─────────────────────────────────────────
     YODA design tokens — terracotta palette
     ───────────────────────────────────────── */
  :root {
    --terracotta: #B85042;
    --terracotta-dark: #8B2E1F;
    --terracotta-darker: #6B1E12;
    --sand: #EFE8D8;
    --cream: #F5F0E8;
    --pale: #FAF6EE;
    --tan-bg: #C99A87;
    --tan-bg-deep: #B68874;
    --dark: #3A2E2A;
    --muted: #6B5D57;
    --soft-muted: #8A7A72;
    --line: rgba(58, 46, 42, 0.12);
    --shadow-soft: 0 4px 16px rgba(60, 30, 20, 0.10);
    --shadow-card: 0 8px 28px rgba(60, 30, 20, 0.16);

    /* responsive type scale - base 16px, scales fluidly */
    --fs-xs: clamp(11px, 1.6vh, 13px);
    --fs-sm: clamp(13px, 1.9vh, 15px);
    --fs-base: clamp(15px, 2.1vh, 17px);
    --fs-md: clamp(17px, 2.4vh, 19px);
    --fs-lg: clamp(20px, 3vh, 24px);
    --fs-xl: clamp(26px, 4vh, 34px);
    --fs-display: clamp(34px, 5.5vh, 48px);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    background: var(--tan-bg);
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }

  /* Subtle paper texture on background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(255, 246, 232, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 85% 90%, rgba(139, 46, 31, 0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* ─────────────────────────────────────────
     App container
     ───────────────────────────────────────── */
  .app {
    position: relative;
    z-index: 2;
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .screen {
    width: 100%;
    height: 100%;
    max-width: 760px;
    max-height: 1100px;
    background: var(--pale);
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 0 0 transparent;
  }

  /* On larger devices (iPad), give the screen a card look */
  @media (min-width: 700px) and (min-height: 900px) {
    .app { padding: 24px; }
    .screen {
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(60, 30, 20, 0.25);
    }
  }

  /* ─────────────────────────────────────────
     Header band
     ───────────────────────────────────────── */
  .header {
    flex: 0 0 auto;
    padding: clamp(20px, 3.5vh, 36px) clamp(24px, 5vw, 48px) clamp(12px, 2vh, 20px);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header .brand {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: var(--fs-xl);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--terracotta-dark);
    line-height: 1;
  }

  .header .tag {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: var(--fs-sm);
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  /* Step indicator */
  .steps {
    display: flex;
    gap: 6px;
    margin-top: clamp(10px, 1.5vh, 16px);
  }

  .step-dot {
    flex: 1;
    height: 3px;
    background: var(--line);
    border-radius: 2px;
    transition: background 0.35s ease;
  }

  .step-dot.active {
    background: var(--terracotta);
  }

  /* ─────────────────────────────────────────
     Main content area
     ───────────────────────────────────────── */
  .content {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: clamp(8px, 1.5vh, 16px) clamp(24px, 5vw, 48px) clamp(20px, 3vh, 32px);
  }

  .content h1 {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-weight: 500;
    font-size: var(--fs-display);
    color: var(--terracotta-dark);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin: clamp(8px, 2vh, 24px) 0 clamp(16px, 2.5vh, 28px);
  }

  .content h2 {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-weight: 500;
    font-size: var(--fs-xl);
    color: var(--terracotta-dark);
    margin: clamp(8px, 2vh, 16px) 0 clamp(12px, 2vh, 20px);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .content h3 {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-weight: 600;
    font-size: var(--fs-lg);
    color: var(--terracotta);
    margin: 0 0 clamp(8px, 1.2vh, 12px);
  }

  .content p {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: var(--fs-md);
    line-height: 1.45;
    color: var(--dark);
    margin: 0 0 clamp(12px, 1.8vh, 18px);
  }

  .content p.lead {
    font-size: var(--fs-lg);
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
  }

  .content em.accent {
    font-style: italic;
    color: var(--terracotta-dark);
  }

  /* Two-purpose explanation cards */
  .purpose {
    background: var(--cream);
    border-radius: 14px;
    padding: clamp(14px, 2vh, 20px) clamp(16px, 2.5vh, 22px);
    margin-bottom: clamp(10px, 1.5vh, 14px);
    border-left: 3px solid var(--terracotta);
  }

  .purpose h3 {
    margin-bottom: 6px;
  }

  .purpose p {
    font-size: var(--fs-base);
    margin: 0;
  }

  /* Consent options */
  .options {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 1.5vh, 14px);
    margin: clamp(16px, 2.5vh, 24px) 0 clamp(20px, 3vh, 28px);
  }

  .option {
    background: var(--cream);
    border-radius: 14px;
    padding: clamp(14px, 2vh, 18px) clamp(16px, 2.5vh, 20px);
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: clamp(12px, 2vw, 16px);
    border: 2px solid transparent;
    user-select: none;
  }

  .option:hover {
    background: var(--sand);
  }

  .option.selected {
    background: var(--sand);
    border-color: var(--terracotta);
  }

  .option .checkbox {
    flex: 0 0 auto;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid var(--soft-muted);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    margin-top: 2px;
  }

  .option.selected .checkbox {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }

  .option .checkbox svg {
    width: 14px;
    height: 14px;
    color: white;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.2s ease;
  }

  .option.selected .checkbox svg {
    opacity: 1;
    transform: scale(1);
  }

  .option .opt-content {
    flex: 1;
  }

  .option .opt-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: var(--fs-md);
    color: var(--terracotta-dark);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .option .opt-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-base);
    color: var(--dark);
    line-height: 1.35;
  }

  /* No-thanks option styling */
  .option.refuse {
    border-left: 3px solid var(--soft-muted);
  }

  .option.refuse .opt-title {
    color: var(--muted);
  }

  /* ─────────────────────────────────────────
     Question form
     ───────────────────────────────────────── */
  .question-block {
    margin-bottom: clamp(20px, 3vh, 28px);
  }

  .question-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--terracotta-dark);
    color: white;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: var(--fs-base);
    margin-right: 10px;
    vertical-align: middle;
  }

  .question-block label.q {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-md);
    font-weight: 600;
    color: var(--terracotta-dark);
    line-height: 1.3;
    display: block;
    margin-bottom: 6px;
  }

  .question-block .q-hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-sm);
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
    margin: 0 0 10px 38px;
  }

  .question-block textarea {
    width: 100%;
    background: white;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: clamp(10px, 1.6vh, 14px) clamp(12px, 2vh, 16px);
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-base);
    color: var(--dark);
    line-height: 1.4;
    min-height: clamp(70px, 11vh, 100px);
    resize: vertical;
    transition: border-color 0.2s ease;
    -webkit-appearance: none;
  }

  .question-block textarea:focus {
    outline: none;
    border-color: var(--terracotta);
  }

  /* Final summary */
  .rights {
    background: var(--cream);
    border-radius: 14px;
    padding: clamp(16px, 2.5vh, 22px);
    margin-top: clamp(16px, 2.5vh, 24px);
  }

  .rights h3 {
    font-size: var(--fs-md);
    margin-bottom: 10px;
  }

  .rights ul {
    margin: 0;
    padding-left: 18px;
    list-style: none;
  }

  .rights li {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-sm);
    line-height: 1.45;
    color: var(--dark);
    margin-bottom: 6px;
    position: relative;
    padding-left: 16px;
  }

  .rights li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--terracotta);
    font-weight: 500;
  }

  .rights p.fine {
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-xs);
    color: var(--soft-muted);
    margin-top: 12px;
    line-height: 1.4;
    font-style: italic;
  }

  /* Final completion screen — center everything */
  .completion {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(24px, 4vh, 48px);
    gap: clamp(16px, 3vh, 32px);
  }

  .completion .candle {
    width: clamp(48px, 8vh, 80px);
    height: clamp(48px, 8vh, 80px);
    border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #FFD27A 0%, var(--terracotta) 60%, var(--terracotta-dark) 100%);
    box-shadow: 0 0 0 8px rgba(184, 80, 66, 0.10), 0 0 0 18px rgba(184, 80, 66, 0.04);
    margin-bottom: clamp(8px, 2vh, 16px);
    animation: pulse 3.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.04); opacity: 0.92; }
  }

  .completion h1 {
    margin: 0;
    font-size: var(--fs-display);
  }

  .completion p {
    max-width: 480px;
    font-size: var(--fs-md);
    color: var(--muted);
    line-height: 1.5;
  }

  .completion .closing-quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: var(--fs-lg);
    color: var(--terracotta-dark);
    line-height: 1.4;
    max-width: 460px;
    margin-top: clamp(8px, 1.5vh, 16px);
    border-top: 1px solid var(--line);
    padding-top: clamp(16px, 2.5vh, 24px);
  }

  /* ─────────────────────────────────────────
     Footer + buttons
     ───────────────────────────────────────── */
  .footer {
    flex: 0 0 auto;
    padding: clamp(14px, 2vh, 20px) clamp(24px, 5vw, 48px) clamp(20px, 3vh, 32px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-top: 1px solid var(--line);
    background: var(--pale);
  }

  .button-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1 1 auto;
    min-width: 0;
    padding: clamp(12px, 2vh, 16px) clamp(16px, 3vw, 24px);
    border-radius: 999px;
    font-family: 'Cormorant Garamond', serif;
    font-size: var(--fs-base);
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    -webkit-appearance: none;
    text-align: center;
    user-select: none;
    line-height: 1.2;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn.primary {
    background: var(--terracotta-dark);
    color: white;
    box-shadow: var(--shadow-soft);
  }

  .btn.primary:hover {
    background: var(--terracotta-darker);
  }

  .btn.primary:disabled {
    background: var(--soft-muted);
    color: var(--cream);
    cursor: not-allowed;
    opacity: 0.6;
  }

  .btn.secondary {
    background: var(--cream);
    color: var(--terracotta-dark);
    border: 1px solid var(--line);
  }

  .btn.secondary:hover {
    background: var(--sand);
  }

  .btn.ghost {
    background: transparent;
    color: var(--muted);
    border: none;
  }

  .btn.ghost:hover {
    color: var(--terracotta-dark);
  }

  /* On narrower screens, stack buttons full-width */
  @media (max-width: 480px) {
    .button-row {
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
    }
  }

  /* ─────────────────────────────────────────
     Screen transitions
     ───────────────────────────────────────── */
  .screen-content {
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Hide scrollbars but keep scrolling */
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

  /* Refuse-only screen styling */
  .refuse-screen {
    text-align: center;
    padding: clamp(24px, 5vh, 48px);
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: clamp(12px, 2vh, 20px);
  }
  .refuse-screen p {
    max-width: 460px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="app">
  <div class="screen" id="screen">
    <!-- Screen content rendered by JS -->
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  //  YODA prototype — 5-screen consent flow
  //  No backend, state held in memory only.
  // ─────────────────────────────────────────
  const TOTAL_STEPS = 5;
  let state = {
    currentScreen: 1,
    consent: {
      knowAsPerson: false,
      possibleMatch: false,
      refused: false
    },
    answers: { q1: '', q2: '', q3: '', q4: '' }
  };

  const screenEl = document.getElementById('screen');

  // ─────────── Render dispatcher ───────────
  function render() {
    const html = renderScreen(state.currentScreen);
    screenEl.innerHTML = html;
    attachHandlers();
  }

  function renderScreen(n) {
    // Special case: refused → terminal short screen
    if (state.consent.refused && n === 5) {
      return refusedScreen();
    }

    return `
      ${renderHeader(n)}
      <div class="content"><div class="screen-content">
        ${screenBody(n)}
      </div></div>
      ${renderFooter(n)}
    `;
  }

  // ─────────── Header ───────────
  function renderHeader(n) {
    const dots = Array.from({ length: TOTAL_STEPS }, (_, i) =>
      `<div class="step-dot ${i < n ? 'active' : ''}"></div>`
    ).join('');

    return `
      <div class="header">
        <div class="brand">YODA</div>
        <div class="tag">Where life stories meet care</div>
        <div class="steps">${dots}</div>
      </div>
    `;
  }

  // ─────────── Body per screen ───────────
  function screenBody(n) {
    switch (n) {
      case 1: return body1();
      case 2: return body2();
      case 3: return body3();
      case 4: return body4();
      case 5: return body5();
    }
  }

  function body1() {
    return `
      <h1>Welcome.</h1>
      <p class="lead">While you are here, our doctors and nurses will take care of your body. We do this every day, with the best of our skill.</p>
      <p>But you are more than your diagnosis. You have a story, a craft, things you love, things you can still give to others.</p>
      <p>If you wish, we would like to know you a little better — <em class="accent">as a person, not only as a patient</em>.</p>
      <p>What follows are four short questions. They are not medical. They are not required. You can answer them all, some of them, or none of them.</p>
      <p style="color: var(--muted); font-style: italic;">The questions take about ten minutes. You can do them now, later, or never.</p>
    `;
  }

  function body2() {
    return `
      <h2>Why we ask.</h2>
      <p>Your answers help us in two ways. You can choose to allow one, both, or neither.</p>

      <div class="purpose">
        <h3>To know you as a person.</h3>
        <p>Your story stays in your hospital record, visible only to the staff caring for you. It changes nothing about your treatment. It changes how we look at you while we treat you.</p>
      </div>

      <div class="purpose">
        <h3>To connect you with someone.</h3>
        <p>If your interests, experiences, or knowledge match those of another patient or a member of our staff, we may ask you whether you would like to meet them. The encounter would happen only with your explicit agreement, in a common space, at a time you choose. You may always say no.</p>
      </div>

      <p style="color: var(--muted); font-style: italic; font-size: var(--fs-sm); margin-top: clamp(12px, 2vh, 18px);">You can change your mind at any moment, and your story can be erased from our system whenever you ask.</p>
    `;
  }

  function body3() {
    const c = state.consent;
    return `
      <h2>Your choices.</h2>
      <p>Please tell us how you would like your story to be used.</p>

      <div class="options">
        <div class="option ${c.knowAsPerson ? 'selected' : ''}" data-key="knowAsPerson">
          <div class="checkbox">${checkSvg()}</div>
          <div class="opt-content">
            <div class="opt-title">Yes — to know me as a person</div>
            <div class="opt-desc">I allow my answers to be visible to the staff caring for me, so they can see me beyond my diagnosis.</div>
          </div>
        </div>

        <div class="option ${c.possibleMatch ? 'selected' : ''}" data-key="possibleMatch">
          <div class="checkbox">${checkSvg()}</div>
          <div class="opt-content">
            <div class="opt-title">Yes — to be possibly connected with someone</div>
            <div class="opt-desc">I allow my answers to be searchable across the hospital, so that staff may identify possible encounters with patients or staff who share my interests. I will be asked again before any encounter takes place.</div>
          </div>
        </div>

        <div class="option refuse ${c.refused ? 'selected' : ''}" data-key="refused">
          <div class="checkbox">${checkSvg()}</div>
          <div class="opt-content">
            <div class="opt-title">No, thank you.</div>
            <div class="opt-desc">I prefer not to share my story. My choice will not affect the medical care I receive.</div>
          </div>
        </div>
      </div>

      <p style="color: var(--muted); font-style: italic; font-size: var(--fs-sm);">You can change these choices at any moment during your stay, by asking any nurse or by tapping the YODA section in your patient app.</p>
    `;
  }

  function body4() {
    const a = state.answers;
    return `
      <h2>Four questions.</h2>
      <p>Take your time. There are no right answers. You can write a little or a lot. You can leave any question blank.</p>

      ${questionBlock(1, 'What did you do — your work, your craft, your role?',
        'We are asking about what you spent your time on, what you were known for. This may be a profession, a trade, a role in your family or community.', a.q1, 'q1')}

      ${questionBlock(2, 'What did you become good at, over the years?',
        'Something you learned to do well. It does not have to be impressive to anyone else. It only has to be true.', a.q2, 'q2')}

      ${questionBlock(3, 'What still moves you today?',
        'Something that still makes your eyes light up. A passion, a curiosity, a memory you keep returning to.', a.q3, 'q3')}

      ${questionBlock(4, 'What is something you could share with another person here?',
        'A story, a skill, a piece of advice, a few minutes of conversation. Something you could offer, if someone wanted it.', a.q4, 'q4')}
    `;
  }

  function questionBlock(num, q, hint, value, key) {
    return `
      <div class="question-block">
        <label class="q"><span class="question-num">${num}</span>${q}</label>
        <p class="q-hint">${hint}</p>
        <textarea data-q="${key}" placeholder="Write here, if you wish…">${escapeHtml(value)}</textarea>
      </div>
    `;
  }

  function body5() {
    return `
      <div class="completion">
        <div class="candle"></div>
        <h1>Thank you.</h1>
        <p>Your story has been saved. It will be treated with the same care as your medical information.</p>

        <div class="closing-quote">
          “It is like adding scent to a candle.<br>
          The candle still gives light.<br>
          But now the room feels different.”
        </div>

        <div class="rights" style="text-align: left; max-width: 480px; margin-top: clamp(20px, 3vh, 32px);">
          <h3>Your rights.</h3>
          <ul>
            <li>You can read, edit, or erase your answers at any time.</li>
            <li>You can withdraw your consent at any time, and your story will be removed from our system.</li>
            <li>Your answers will never be used for purposes other than the ones you have agreed to.</li>
            <li>When you leave the hospital, you will receive a copy of your answers, along with a small list of community organizations near you that match what you shared.</li>
          </ul>
          <p class="fine">If you have any questions about how your information is used, you can ask any nurse, or contact our Data Protection Officer at the number printed on your admission documents.</p>
        </div>
      </div>
    `;
  }

  function refusedScreen() {
    return `
      ${renderHeader(5)}
      <div class="content"><div class="screen-content">
        <div class="refuse-screen">
          <div class="candle" style="background: radial-gradient(circle at 50% 40%, #d8c8b0 0%, var(--soft-muted) 60%, var(--muted) 100%);"></div>
          <h1>Thank you.</h1>
          <p>We respect your choice. Your medical care will continue exactly as planned, with the same attention and excellence.</p>
          <p style="font-style: italic; color: var(--terracotta-dark);">If you change your mind during your stay, you can speak with any nurse — the door is always open.</p>
        </div>
      </div></div>
      <div class="footer">
        <div class="button-row">
          <button class="btn primary" onclick="reset()">Done</button>
        </div>
      </div>
    `;
  }

  // ─────────── Footer ───────────
  function renderFooter(n) {
    if (n === 1) {
      return `
        <div class="footer">
          <div class="button-row">
            <button class="btn primary" onclick="next()">Continue</button>
            <button class="btn secondary" onclick="next()">Maybe later</button>
            <button class="btn ghost" onclick="goRefuse()">Not interested</button>
          </div>
        </div>
      `;
    }
    if (n === 2) {
      return `
        <div class="footer">
          <div class="button-row">
            <button class="btn secondary" onclick="prev()">Back</button>
            <button class="btn primary" onclick="next()">Continue</button>
          </div>
        </div>
      `;
    }
    if (n === 3) {
      const anySelected = state.consent.knowAsPerson || state.consent.possibleMatch || state.consent.refused;
      return `
        <div class="footer">
          <div class="button-row">
            <button class="btn secondary" onclick="prev()">Back</button>
            <button class="btn primary" ${anySelected ? '' : 'disabled'} onclick="confirmConsent()">Confirm</button>
          </div>
        </div>
      `;
    }
    if (n === 4) {
      return `
        <div class="footer">
          <div class="button-row">
            <button class="btn secondary" onclick="prev()">Back</button>
            <button class="btn primary" onclick="next()">Save</button>
          </div>
        </div>
      `;
    }
    if (n === 5) {
      return `
        <div class="footer">
          <div class="button-row">
            <button class="btn primary" onclick="reset()">Done</button>
          </div>
        </div>
      `;
    }
    return '';
  }

  // ─────────── Handlers ───────────
  function attachHandlers() {
    // option clicks (screen 3)
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', () => {
        const key = opt.dataset.key;
        if (key === 'refused') {
          // refused is mutually exclusive with the others
          state.consent.refused = !state.consent.refused;
          if (state.consent.refused) {
            state.consent.knowAsPerson = false;
            state.consent.possibleMatch = false;
          }
        } else {
          state.consent[key] = !state.consent[key];
          if (state.consent[key]) {
            state.consent.refused = false;
          }
        }
        render();
      });
    });

    // textareas (screen 4)
    document.querySelectorAll('textarea[data-q]').forEach(ta => {
      ta.addEventListener('input', e => {
        state.answers[e.target.dataset.q] = e.target.value;
      });
    });
  }

  // ─────────── Navigation ───────────
  function next() {
    if (state.currentScreen < TOTAL_STEPS) {
      state.currentScreen++;
      // skip questions screen if user refused
      if (state.currentScreen === 4 && state.consent.refused) {
        state.currentScreen = 5;
      }
      render();
      scrollTop();
    }
  }

  function prev() {
    if (state.currentScreen > 1) {
      state.currentScreen--;
      // when going back from final to questions, skip questions if refused
      if (state.currentScreen === 4 && state.consent.refused) {
        state.currentScreen = 3;
      }
      render();
      scrollTop();
    }
  }

  function confirmConsent() {
    if (state.consent.refused) {
      state.currentScreen = 5;
    } else {
      state.currentScreen = 4;
    }
    render();
    scrollTop();
  }

  function goRefuse() {
    state.consent.refused = true;
    state.consent.knowAsPerson = false;
    state.consent.possibleMatch = false;
    state.currentScreen = 5;
    render();
    scrollTop();
  }

  function reset() {
    state = {
      currentScreen: 1,
      consent: { knowAsPerson: false, possibleMatch: false, refused: false },
      answers: { q1: '', q2: '', q3: '', q4: '' }
    };
    render();
    scrollTop();
  }

  function scrollTop() {
    setTimeout(() => {
      const c = document.querySelector('.content');
      if (c) c.scrollTop = 0;
    }, 50);
  }

  // ─────────── Utilities ───────────
  function checkSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  // ─────────── Init ───────────
  render();
</script>
</body>
</html>
